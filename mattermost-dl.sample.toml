# This is sample configuration that downloads few speciic channels

version = "1"

downloadTeamChannels=false
downloadGroupChannels=false
downloadUserChannels=false

[connection]
hostname = "https://mattermost-server.com"
usedApi = 4
username = "user.name"
token = "76vnm1dwpo08v1f0etc5tp49mgn4pma1"

[throttling]
# Upper bound on simultaneous requests; channels and their files download in
# parallel up to this many in-flight requests. Default 1 (sequential). Raising it
# (e.g. 4-8) speeds up large/attachment-heavy backups; the effective concurrency is
# automatically backed off if the server starts timing out or dropping connections.
maxConcurrency = 4
# Aggregate cap on requests per second across all workers (a shared token bucket).
# Independent of maxConcurrency, this bounds steady-state load on the server -- the
# polite-citizen knob. Default 0 (unlimited).
maxRequestsPerSecond = 8

[output]
# Relative to current working directory
directory = "./mattermost-backup"

[report]
progressInterval=5000

[privateChannelOptions]
maximumPostCount = 10000

[[users]]
name = "spike.spiegel"
beforeTime = "2001-11-26"

[[users]]
name = "jet.black"
sessionPostLimit = 1000

[[users]]
name = "faye.valentine"
attachments.download = true
attachments.maxSize = 1000000

[[groups]]
group = [
    {name = "spike.spiegel"},
    {name = "jet.black"},
    {name = "faye.valentine"}
]
# Combining conditions
afterPost = "s01e05" # Post Id
beforeTime = "2001-11-26"

[[teams]]
team.internalName = "yutani"
downloadPublicChannels = true # All available _public_ channels
downloadPrivateChannels = false

[[teams.privateChannels]]
internalName = "nostromo"
# Settings inherited from privateChannelOptions

[[teams.privateChannels]]
internalName = "acheron"
maximumPostCount = -1 # Explicit overriding of privateChannelOptions
# Don't download custom emoji occuring in this channel
emoji.download = false

[[teams.privateChannels]]
name = "Fiorina 161"
# Fetch 10 latest posts (download runs newest->oldest, so a cap keeps the newest)
maximumPostCount = 10

[[teams.privateChannels]]
internalName = "auriga"
# Starting from scratch
onExistingCompatible = "delete"
onExistingIncompatible = "delete"
